name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Coverage thresholds
        run: pnpm run test:coverage

      - name: Lightweight validation (offline)
        run: pnpm run validate:panchang

      - name: Legal and provenance checks
        run: pnpm run legal:check

      - name: Trust checks
        run: pnpm run deps:check && pnpm run trust:check

      - name: Production dependency audit
        run: pnpm audit --prod

      - name: Build package
        run: pnpm run build

      - name: Build docs
        run: pnpm run docs:build
