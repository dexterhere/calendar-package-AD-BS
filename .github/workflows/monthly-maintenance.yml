name: Monthly Panchang Maintenance

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run monthly maintenance
        run: pnpm run maintenance:monthly

      - name: Upload maintenance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-maintenance-reports
          path: |
            reports/monthly-maintenance-summary.json
            validation/reports/**/*.json
            validation-report.txt
